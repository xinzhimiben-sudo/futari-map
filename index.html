<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ふたりの行きたいところ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --coral: #E8614A; --coral-light: #FFF0EE; --coral-dark: #C44A34;
  --sand: #F5F0E8; --sand-dark: #E8E0D0; --ink: #2A2318;
  --ink-mid: #6B5E4E; --ink-light: #A89880; --white: #FDFAF6;
  --green: #4A8C6F; --green-light: #EBF5F0;
  --radius: 16px; --radius-sm: 10px;
  --shadow: 0 2px 16px rgba(42,35,24,0.08);
  --shadow-md: 0 4px 24px rgba(42,35,24,0.12);
}
body { font-family: 'Zen Maru Gothic', sans-serif; background: var(--sand); color: var(--ink); min-height: 100vh; }

/* NAME SCREEN */
#name-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; background: var(--white); }
.name-card { background: var(--white); border: 1.5px solid var(--sand-dark); border-radius: 24px; padding: 2.5rem 2rem; max-width: 360px; width: 100%; text-align: center; box-shadow: var(--shadow-md); }
.name-card .pin-emoji { font-size: 48px; display: block; margin-bottom: 1rem; animation: bounce 2s infinite; }
@keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
.name-card h1 { font-size: 22px; font-weight: 700; margin-bottom: 0.4rem; }
.name-card p { font-size: 14px; color: var(--ink-mid); margin-bottom: 1.5rem; line-height: 1.6; }
.name-input { width: 100%; padding: 12px 16px; border: 1.5px solid var(--sand-dark); border-radius: var(--radius-sm); font-family: 'Zen Maru Gothic', sans-serif; font-size: 16px; background: var(--sand); color: var(--ink); outline: none; transition: border-color 0.2s; margin-bottom: 1rem; }
.name-input:focus { border-color: var(--coral); }
.start-btn { width: 100%; padding: 13px; background: var(--coral); color: white; border: none; border-radius: var(--radius-sm); font-family: 'Zen Maru Gothic', sans-serif; font-size: 16px; font-weight: 700; cursor: pointer; }
.start-btn:hover { background: var(--coral-dark); }

/* MAIN APP */
#app { display: none; max-width: 640px; margin: 0 auto; padding: 0 0 6rem; }

/* HEADER */
.app-header { background: var(--white); border-bottom: 1.5px solid var(--sand-dark); padding: 1rem 1.25rem 0.75rem; position: sticky; top: 0; z-index: 50; }
.header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.6rem; }
.header-title { display: flex; align-items: center; gap: 8px; }
.header-title h1 { font-size: 17px; font-weight: 700; }
.user-badge { background: var(--coral-light); color: var(--coral-dark); font-size: 13px; font-weight: 700; padding: 5px 12px; border-radius: 99px; border: 1.5px solid var(--coral); white-space: nowrap; }
.sync-indicator { font-size: 11px; color: var(--ink-light); display: flex; align-items: center; gap: 5px; margin-bottom: 0.6rem; }
.sync-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

/* TABS (リスト/マップ) */
.view-tabs { display: flex; gap: 6px; margin-bottom: 0.75rem; }
.view-tab { flex: 1; padding: 7px; border-radius: var(--radius-sm); border: 1.5px solid var(--sand-dark); background: var(--sand); color: var(--ink-mid); font-family: 'Zen Maru Gothic', sans-serif; font-size: 13px; font-weight: 700; cursor: pointer; text-align: center; transition: all 0.15s; }
.view-tab.active { background: var(--coral); border-color: var(--coral); color: white; }

/* 大カテゴリフィルター */
.big-cat-row { display: flex; gap: 6px; overflow-x: auto; scrollbar-width: none; padding-bottom: 4px; }
.big-cat-row::-webkit-scrollbar { display: none; }
.big-cat-chip { flex-shrink: 0; padding: 6px 14px; border-radius: 99px; font-size: 13px; font-family: 'Zen Maru Gothic', sans-serif; border: 1.5px solid var(--sand-dark); background: var(--white); color: var(--ink-mid); cursor: pointer; transition: all 0.15s; white-space: nowrap; font-weight: 500; }
.big-cat-chip.active { background: var(--ink); border-color: var(--ink); color: white; font-weight: 700; }

/* 小カテゴリフィルター */
.sub-cat-row { display: flex; gap: 5px; overflow-x: auto; scrollbar-width: none; padding: 0.5rem 1.25rem 0; background: var(--sand); }
.sub-cat-row::-webkit-scrollbar { display: none; }
.sub-cat-chip { flex-shrink: 0; padding: 4px 10px; border-radius: 99px; font-size: 12px; font-family: 'Zen Maru Gothic', sans-serif; border: 1.5px solid var(--sand-dark); background: var(--white); color: var(--ink-mid); cursor: pointer; transition: all 0.15s; white-space: nowrap; }
.sub-cat-chip.active { border-color: var(--coral); color: var(--coral-dark); background: var(--coral-light); font-weight: 700; }

/* STATS */
.stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; padding: 0.75rem 1.25rem 0; }
.stat-box { background: var(--white); border-radius: var(--radius-sm); padding: 10px; text-align: center; border: 1.5px solid var(--sand-dark); }
.stat-num { font-size: 22px; font-weight: 700; color: var(--coral); }
.stat-label { font-size: 11px; color: var(--ink-mid); margin-top: 2px; }

/* MAP SEARCH BAR */
.map-search-bar { margin: 0.75rem 1.25rem 0; }
#pac-input { width: 100%; padding: 11px 14px; border: 1.5px solid var(--sand-dark); border-radius: var(--radius-sm); font-family: 'Zen Maru Gothic', sans-serif; font-size: 14px; background: var(--white); color: var(--ink); outline: none; transition: border-color 0.2s; }
#pac-input:focus { border-color: var(--coral); }

/* MAP VIEW */
#map-view { display: none; padding: 0.75rem 1.25rem; }
#map-container { width: 100%; height: 420px; border-radius: var(--radius); overflow: hidden; border: 1.5px solid var(--sand-dark); }
.map-spot-list { margin-top: 0.75rem; display: flex; flex-direction: column; gap: 8px; }
.map-spot-item { background: var(--white); border: 1.5px solid var(--sand-dark); border-radius: var(--radius-sm); padding: 10px 12px; display: flex; align-items: center; gap: 10px; cursor: pointer; transition: border-color 0.15s; }
.map-spot-item:hover { border-color: var(--coral); }
.map-spot-num { width: 24px; height: 24px; border-radius: 50%; background: var(--coral); color: white; font-size: 12px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.map-spot-info { flex: 1; }
.map-spot-name { font-size: 14px; font-weight: 700; }
.map-spot-cat { font-size: 12px; color: var(--ink-mid); }

/* SPOT CARDS */
#list-view { padding: 0.75rem 1.25rem; }
.spot-card { background: var(--white); border: 1.5px solid var(--sand-dark); border-radius: var(--radius); margin-bottom: 10px; overflow: hidden; transition: transform 0.15s, box-shadow 0.15s; animation: slideIn 0.25s ease; }
@keyframes slideIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
.spot-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
.spot-card.visited { opacity: 0.55; }
.card-accent { height: 4px; }
.card-body { padding: 0.9rem 1rem; }
.card-top { display: flex; align-items: flex-start; gap: 10px; }
.cat-icon { width: 42px; height: 42px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
.card-info { flex: 1; min-width: 0; }
.card-name-row { display: flex; align-items: center; gap: 6px; margin-bottom: 5px; flex-wrap: wrap; }
.card-name { font-size: 15px; font-weight: 700; }
.visited-tag { font-size: 11px; padding: 2px 8px; border-radius: 99px; background: var(--green-light); color: var(--green); font-weight: 700; border: 1px solid var(--green); }
.card-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.cat-tag { font-size: 12px; padding: 3px 10px; border-radius: 99px; font-weight: 500; }
.stars-row { display: flex; }
.star-btn { background: none; border: none; font-size: 15px; cursor: pointer; padding: 1px; transition: transform 0.1s; line-height: 1; }
.star-btn:hover { transform: scale(1.25); }
.added-by { font-size: 11px; color: var(--ink-light); font-family: 'DM Mono', monospace; }
.card-memo { font-size: 13px; color: var(--ink-mid); margin-top: 8px; padding-top: 8px; border-top: 1px dashed var(--sand-dark); line-height: 1.6; word-break: break-all; }
.card-memo a { color: var(--coral); text-decoration: underline; }
.card-actions { display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap; }
.action-btn { font-size: 12px; padding: 5px 10px; border-radius: var(--radius-sm); border: 1.5px solid var(--sand-dark); background: var(--sand); color: var(--ink-mid); cursor: pointer; font-family: 'Zen Maru Gothic', sans-serif; transition: all 0.15s; display: flex; align-items: center; gap: 4px; }
.action-btn:hover { background: var(--sand-dark); }
.btn-go { border-color: var(--green); color: var(--green); background: var(--green-light); }
.btn-go:hover { background: var(--green); color: white; }
.btn-map { border-color: #3A78B5; color: #3A78B5; background: #EBF3FC; }
.btn-map:hover { background: #3A78B5; color: white; }
.btn-del { border-color: #e0b0b0; color: #b04040; background: #fff5f5; }
.btn-del:hover { background: #b04040; color: white; }

/* PLACE DETAIL CARD */
.place-detail-card { margin: 0.5rem 1.25rem 0; background: var(--white); border: 1.5px solid var(--sand-dark); border-radius: var(--radius); overflow: hidden; animation: slideIn 0.2s ease; display: none; }
.place-detail-card.show { display: block; }
.place-detail-img { width: 100%; height: 160px; object-fit: cover; background: var(--sand-dark); }
.place-detail-img-placeholder { width: 100%; height: 160px; background: var(--sand-dark); display: flex; align-items: center; justify-content: center; font-size: 36px; }
.place-detail-body { padding: 0.875rem 1rem; }
.place-detail-name { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
.place-detail-rating { font-size: 13px; color: var(--ink-mid); margin-bottom: 4px; display: flex; align-items: center; gap: 6px; }
.place-detail-addr { font-size: 12px; color: var(--ink-light); margin-bottom: 10px; line-height: 1.5; }
.place-detail-actions { display: flex; gap: 8px; }
.place-detail-btn { flex: 1; padding: 9px; border-radius: var(--radius-sm); border: none; font-family: 'Zen Maru Gothic', sans-serif; font-size: 13px; font-weight: 700; cursor: pointer; transition: all 0.15s; }
.place-detail-btn.add { background: var(--coral); color: white; }
.place-detail-btn.add:hover { background: var(--coral-dark); }
.place-detail-btn.maps { background: var(--sand); border: 1.5px solid var(--sand-dark); color: var(--ink-mid); }
.place-detail-btn.maps:hover { background: var(--sand-dark); }

.pac-sugg-item { padding:10px 14px;cursor:pointer;border-bottom:1px solid var(--sand-dark);transition:background 0.1s;font-family:'Zen Maru Gothic',sans-serif; }
/* Google純正のAutocompleteドロップダウンを非表示 */
.pac-container { display:none !important; }
.pac-sugg-item:last-child { border-bottom:none; }
.pac-sugg-item:hover { background:var(--sand); }

/* FAB */
.fab { position: fixed; bottom: 2rem; right: 50%; transform: translateX(50%); max-width: 220px; width: calc(100% - 2.5rem); background: var(--coral); color: white; border: none; border-radius: 99px; padding: 14px 24px; font-size: 15px; font-weight: 700; font-family: 'Zen Maru Gothic', sans-serif; cursor: pointer; box-shadow: 0 4px 20px rgba(232,97,74,0.4); transition: background 0.2s; z-index: 40; display: flex; align-items: center; justify-content: center; gap: 8px; }
.fab:hover { background: var(--coral-dark); }

/* MODAL */
.modal-overlay { position: fixed; inset: 0; background: rgba(42,35,24,0.45); z-index: 100; display: flex; align-items: flex-end; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
.modal-overlay.open { opacity: 1; pointer-events: all; }
.modal { background: var(--white); border-radius: 24px 24px 0 0; padding: 1.5rem 1.25rem 2rem; width: 100%; max-width: 640px; transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.4,0,0.2,1); max-height: 90vh; overflow-y: auto; }
.modal-overlay.open .modal { transform: translateY(0); }
.modal-handle { width: 36px; height: 4px; background: var(--sand-dark); border-radius: 99px; margin: 0 auto 1.25rem; }
.modal-title { font-size: 17px; font-weight: 700; margin-bottom: 1.25rem; }
.field { margin-bottom: 1rem; }
.field label { display: block; font-size: 13px; color: var(--ink-mid); margin-bottom: 6px; font-weight: 500; }
.field input, .field textarea { width: 100%; padding: 11px 14px; border: 1.5px solid var(--sand-dark); border-radius: var(--radius-sm); font-family: 'Zen Maru Gothic', sans-serif; font-size: 15px; background: var(--sand); color: var(--ink); outline: none; transition: border-color 0.2s; }
.field input:focus, .field textarea:focus { border-color: var(--coral); background: var(--white); }
.field textarea { height: 70px; resize: none; }

/* 2段階カテゴリ選択 */
.big-cat-select { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-bottom: 8px; }
.big-cat-opt { padding: 9px 4px; border: 1.5px solid var(--sand-dark); border-radius: var(--radius-sm); text-align: center; font-size: 13px; cursor: pointer; background: var(--white); color: var(--ink-mid); font-family: 'Zen Maru Gothic', sans-serif; transition: all 0.15s; }
.big-cat-opt.selected { border-color: var(--ink); background: var(--ink); color: white; font-weight: 700; }
.sub-cat-select { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; display: none; }
.sub-cat-select.show { display: grid; }
.sub-cat-opt { padding: 8px 4px; border: 1.5px solid var(--sand-dark); border-radius: var(--radius-sm); text-align: center; font-size: 12px; cursor: pointer; background: var(--white); color: var(--ink-mid); font-family: 'Zen Maru Gothic', sans-serif; transition: all 0.15s; line-height: 1.4; }
.sub-cat-opt.selected { border-color: var(--coral); background: var(--coral-light); color: var(--coral-dark); font-weight: 700; }

.pri-row { display: flex; gap: 6px; }
.pri-btn { flex: 1; padding: 9px 4px; border: 1.5px solid var(--sand-dark); border-radius: var(--radius-sm); text-align: center; font-size: 13px; cursor: pointer; background: var(--white); color: var(--ink-mid); font-family: 'Zen Maru Gothic', sans-serif; transition: all 0.15s; }
.pri-btn.selected { border-color: var(--coral); background: var(--coral-light); color: var(--coral-dark); font-weight: 700; }
.modal-btns { display: flex; gap: 8px; margin-top: 1.5rem; }
.modal-btns button { flex: 1; padding: 12px; border-radius: var(--radius-sm); font-size: 15px; font-family: 'Zen Maru Gothic', sans-serif; font-weight: 700; cursor: pointer; border: 1.5px solid var(--sand-dark); background: var(--sand); color: var(--ink-mid); }
.modal-btns .save { background: var(--coral); border-color: var(--coral); color: white; }
.place-preview { background: var(--sand); border-radius: var(--radius-sm); padding: 10px 12px; margin-bottom: 1rem; font-size: 13px; color: var(--ink-mid); border: 1.5px solid var(--sand-dark); display: none; }
.place-preview.show { display: block; }
.place-preview strong { color: var(--ink); font-size: 14px; display: block; margin-bottom: 2px; }
.empty { text-align: center; padding: 3rem 1rem; color: var(--ink-light); }
.empty-emoji { font-size: 40px; display: block; margin-bottom: 0.75rem; }
</style>
</head>
<body>

<div id="name-screen">
  <div class="name-card">
    <span class="pin-emoji">📍</span>
    <h1>ふたりの行きたいところ</h1>
    <p>あなたの名前を入れてね。<br>彼女と同じリストをリアルタイムで共有できるよ！</p>
    <input class="name-input" id="username-input" type="text" placeholder="例：たろう" maxlength="10">
    <button class="start-btn" onclick="startApp()">はじめる ✈️</button>
  </div>
</div>

<div id="app">
  <div class="app-header">
    <div class="header-top">
      <div class="header-title"><span>🗺️</span><h1>ふたりの行きたいところ</h1></div>
      <div class="user-badge" id="user-badge"></div>
    </div>
    <div class="sync-indicator"><div class="sync-dot"></div><span>リアルタイム同期中</span></div>
    <div class="view-tabs">
      <div class="view-tab active" onclick="setView('list',this)">📋 リスト</div>
      <div class="view-tab" onclick="setView('map',this)">🗺️ マップ</div>
    </div>
    <div class="big-cat-row" id="big-cat-row"></div>
  </div>

  <div class="sub-cat-row" id="sub-cat-row" style="display:none"></div>

  <div class="stats-row" id="stats-row"></div>

  <div id="list-view"></div>

  <div id="map-view" style="display:none;">
    <div style="padding:0.75rem 1.25rem 0.5rem;position:relative;">
      <input id="pac-input" type="text" placeholder="🔍 ごはん・カフェ・観光など入力…" autocomplete="new-password" role="combobox" inputmode="search" enterkeyhint="search" style="width:100%;padding:11px 14px;border:1.5px solid var(--sand-dark);border-radius:var(--radius-sm);font-family:'Zen Maru Gothic',sans-serif;font-size:14px;background:var(--white);color:var(--ink);outline:none;transition:border-color 0.2s;">
      <div id="pac-suggestions" style="display:none;position:absolute;left:1.25rem;right:1.25rem;background:var(--white);border:1.5px solid var(--sand-dark);border-radius:var(--radius-sm);z-index:200;box-shadow:var(--shadow-md);max-height:280px;overflow-y:auto;"></div>
    </div>
    <div style="padding:0 1.25rem;position:relative;">
      <div id="map-container"></div>
      <button onclick="goToMyLocation()" style="position:absolute;bottom:16px;right:28px;width:42px;height:42px;border-radius:50%;background:white;border:none;box-shadow:0 2px 8px rgba(0,0,0,0.2);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:10;" title="現在地に移動">📍</button>
    </div>
    <div class="place-detail-card" id="place-detail-card">
      <div id="place-detail-img-wrap"></div>
      <div class="place-detail-body">
        <div class="place-detail-name" id="place-detail-name"></div>
        <div class="place-detail-rating" id="place-detail-rating"></div>
        <div class="place-detail-addr" id="place-detail-addr"></div>
        <div class="place-detail-actions">
          <button class="place-detail-btn add" onclick="addFromDetail()">＋ リストに追加</button>
          <button class="place-detail-btn maps" id="place-detail-mapbtn" onclick="">🗺️ Googleマップで開く</button>
        </div>
      </div>
    </div>
    <div class="map-spot-list" id="map-spot-list"></div>
  </div>

  <button class="fab" onclick="openModal()">＋ 場所を追加</button>
</div>

<div class="modal-overlay" id="modal-overlay" onclick="closeModalBg(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modal-title">場所を追加</div>
    <div class="field">
      <label>🔍 場所を検索（Googleマップから）</label>
      <input type="text" id="modal-pac-input" placeholder="例：渋谷スカイ、代々木公園…">
    </div>
    <div class="place-preview" id="place-preview"><strong id="preview-name"></strong><span id="preview-addr"></span></div>
    <div class="field"><label>場所の名前</label><input type="text" id="f-name" placeholder="例：代々木公園"></div>
    <div class="field">
      <label>カテゴリ</label>
      <div class="big-cat-select" id="modal-big-cat"></div>
      <div class="sub-cat-select" id="modal-sub-cat" style="display:none;"></div>
    </div>
    <div class="field"><label>行きたい度</label>
      <div class="pri-row" id="pri-row">
        <div class="pri-btn" data-v="1" onclick="selPri(this)" ontouchend="selPri(this)">★ ちょっと</div>
        <div class="pri-btn" data-v="2" onclick="selPri(this)" ontouchend="selPri(this)">★★ 行きたい</div>
        <div class="pri-btn" data-v="3" onclick="selPri(this)" ontouchend="selPri(this)">★★★ 絶対！</div>
      </div>
    </div>
    <div class="field"><label>メモ・リンク（TikTok・Googleマップなど貼ってOK）</label><textarea id="f-memo" placeholder="https://... やメモを入力"></textarea></div>
    <div class="modal-btns">
      <button onclick="closeModal()">キャンセル</button>
      <button class="save" onclick="saveSpot()">保存する</button>
    </div>
  </div>
</div>

<script>
// ========== カテゴリ定義 ==========
const BIG_CATS = [
  { v:'食事',       e:'🍽️', color:'#E65100' },
  { v:'カフェ・スイーツ', e:'☕', color:'#D4900A' },
  { v:'おでかけ',   e:'🗺️', color:'#3A78B5' },
  { v:'ショッピング',e:'🛍️', color:'#C45890' },
  { v:'エンタメ',   e:'🎡', color:'#7A5CB8' },
  { v:'リラックス', e:'♨️', color:'#4A8C6F' },
];

const SUB_CATS = {
  '食事': [
    { v:'ラーメン',   e:'🍜', bg:'#FFF3E0', ac:'#E65100', tx:'#BF360C' },
    { v:'イタリアン', e:'🍝', bg:'#FCE4EC', ac:'#C2185B', tx:'#880E4F' },
    { v:'和食',       e:'🍱', bg:'#F3E5F5', ac:'#7B1FA2', tx:'#4A148C' },
    { v:'ディナー',   e:'🥂', bg:'#E8EAF6', ac:'#3949AB', tx:'#1A237E' },

function getSubCat(subVal) {
  for (const subs of Object.values(SUB_CATS)) {
    const found = subs.find(s => s.v === subVal);
    if (found) return found;
  }
  return { e:'📍', bg:'#F5F0E8', ac:'#A89880', tx:'#6B5E4E' };
}

function getBigCatOf(subVal) {
  for (const [big, subs] of Object.entries(SUB_CATS)) {
    if (subs.find(s => s.v === subVal)) return big;
  }
  return null;
}

// ========== Google Maps ==========
function initMaps() {
  // ヘッダー検索バー
  const input = document.getElementById('pac-input');
  // pac-inputはTextSearch方式で動作
  const service = new google.maps.places.PlacesService(document.createElement('div'));
  const suggList = document.getElementById('pac-suggestions');
  let userLocation = new google.maps.LatLng(35.6812, 139.7671);
  let searchTimer = null;
  let isTouchSelecting = false;

  // 現在地取得
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(pos => {
      userLocation = new google.maps.LatLng(pos.coords.latitude, pos.coords.longitude);
      if (gmap) gmap.setCenter(userLocation);
    });
  }

  function searchPlaces(query) {
    if (!query.trim()) { suggList.style.display='none'; return; }
    service.textSearch({ query, location: userLocation, radius: 5000, language: 'ja' }, (results, status) => {
      if (status !== google.maps.places.PlacesServiceStatus.OK || !results.length) {
        suggList.innerHTML = '<div style="padding:10px 14px;font-size:13px;color:var(--ink-light)">見つかりませんでした</div>';
        suggList.style.display = 'block';
        return;
      }
      suggList.innerHTML = results.slice(0, 6).map(r =>
        `<div class="pac-sugg-item" data-pid="${r.place_id}">
          <span style="font-size:15px;font-weight:500">${r.name}</span>
          <span style="font-size:12px;color:var(--ink-light);display:block;margin-top:2px">${r.formatted_address||''}</span>
        </div>`
      ).join('');
      suggList.querySelectorAll('.pac-sugg-item').forEach(el => {
        el.addEventListener('touchstart', () => { isTouchSelecting = true; }, { passive: true });
        el.addEventListener('touchend', e => {
          e.preventDefault();
          isTouchSelecting = false;
          const pid = el.dataset.pid;
          suggList.style.display = 'none';
          input.value = '';
          service.getDetails({ placeId: pid, fields: ['name','formatted_address','geometry','rating','user_ratings_total','photos','url','website'], language: 'ja' }, (details, status) => {
            if (status === google.maps.places.PlacesServiceStatus.OK) showPlaceDetail(details);
          });
        });
        el.addEventListener('mousedown', e => {
          e.preventDefault();
          const pid = el.dataset.pid;
          suggList.style.display = 'none';
          input.value = '';
          service.getDetails({ placeId: pid, fields: ['name','formatted_address','geometry','rating','user_ratings_total','photos','url','website'], language: 'ja' }, (details, status) => {
            if (status === google.maps.places.PlacesServiceStatus.OK) showPlaceDetail(details);
          });
        });
      });
      suggList.style.display = 'block';
    });
  }

  // 入力で検索
  input.addEventListener('input', () => {
    clearTimeout(searchTimer);
    if (!input.value.trim()) { suggList.style.display='none'; return; }
    searchTimer = setTimeout(() => searchPlaces(input.value), 600);
  });

  // Enter・完了・検索ボタン
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); clearTimeout(searchTimer); searchPlaces(input.value); }
  });

  // blur：タッチ選択中でなければ候補を消す
  input.addEventListener('blur', () => {
    if (!isTouchSelecting) setTimeout(() => { suggList.style.display='none'; }, 300);
  });

  input.addEventListener('focus', () => { if (input.value.trim()) searchPlaces(input.value); });

  // モーダル内検索バー
  const modalInput = document.getElementById('modal-pac-input');
  const modalAC = new google.maps.places.Autocomplete(modalInput, { language:'ja' });
  modalAC.addListener('place_changed', () => {
    const place = modalAC.getPlace();
    if (!place.name) return;
    selectedPlace = {
      name: place.name,
      addr: place.formatted_address || '',
      mapUrl: place.url || `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(place.name)}`,
      lat: place.geometry?.location?.lat(),
      lng: place.geometry?.location?.lng(),
    };
    document.getElementById('f-name').value = selectedPlace.name;
    document.getElementById('preview-name').textContent = selectedPlace.name;
    document.getElementById('preview-addr').textContent = selectedPlace.addr;
    document.getElementById('place-preview').classList.add('show');
    modalInput.value = '';
  });

  // マップ初期化（東京中心）
  gmap = new google.maps.Map(document.getElementById('map-container'), {
    center: { lat: 35.6812, lng: 139.7671 },
    zoom: 11,
    mapTypeControl: false,
    streetViewControl: false,
    fullscreenControl: false,
  });
}

function showPlaceDetail(place) {
  selectedPlace = {
    name: place.name,
    addr: place.formatted_address || '',
    mapUrl: place.url || `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(place.name)}`,
    lat: place.geometry?.location?.lat(),
    lng: place.geometry?.location?.lng(),
    rating: place.rating,
    ratingCount: place.user_ratings_total,
    photos: place.photos,
    website: place.website || null,
  };

  // 地図をその場所に移動
  if (gmap && selectedPlace.lat && selectedPlace.lng) {
    gmap.setCenter({ lat: selectedPlace.lat, lng: selectedPlace.lng });
    gmap.setZoom(16);
    new google.maps.Marker({
      position: { lat: selectedPlace.lat, lng: selectedPlace.lng },
      map: gmap,
      animation: google.maps.Animation.DROP,
    });
  }

  // 詳細カードを表示
  const card = document.getElementById('place-detail-card');
  document.getElementById('place-detail-name').textContent = selectedPlace.name;

  // 写真
  const imgWrap = document.getElementById('place-detail-img-wrap');
  if (selectedPlace.photos && selectedPlace.photos.length > 0) {
    const photoUrl = selectedPlace.photos[0].getUrl({ maxWidth: 600, maxHeight: 300 });
    imgWrap.innerHTML = `<img class="place-detail-img" src="${photoUrl}" alt="${selectedPlace.name}">`;
  } else {
    imgWrap.innerHTML = `<div class="place-detail-img-placeholder">📍</div>`;
  }

  // 評価
  const ratingEl = document.getElementById('place-detail-rating');
  if (selectedPlace.rating) {
    const stars = '★'.repeat(Math.round(selectedPlace.rating)) + '☆'.repeat(5 - Math.round(selectedPlace.rating));
    ratingEl.innerHTML = `<span style="color:#F4A50A">${stars}</span> <span>${selectedPlace.rating}</span> <span style="color:var(--ink-light)">(${selectedPlace.ratingCount || 0}件)</span>`;
  } else {
    ratingEl.textContent = '';
  }

  document.getElementById('place-detail-addr').textContent = selectedPlace.addr;
  document.getElementById('place-detail-mapbtn').onclick = () => window.open(selectedPlace.mapUrl, '_blank');

  // ウェブサイトボタン
  const existingWebBtn = document.getElementById('place-detail-webbtn');
  if (existingWebBtn) existingWebBtn.remove();
  if (selectedPlace.website) {
    const webBtn = document.createElement('button');
    webBtn.id = 'place-detail-webbtn';
    webBtn.className = 'place-detail-btn maps';
    webBtn.innerHTML = '🌐 ウェブサイト';
    webBtn.onclick = () => window.open(selectedPlace.website, '_blank');
    document.querySelector('.place-detail-actions').appendChild(webBtn);
  }

  card.classList.add('show');
}

function addMarkerToMap(s, i, bounds, mapList) {
  const ci = getSubCat(s.cat);
  const pos = { lat: s.lat, lng: s.lng };
  const marker = new google.maps.Marker({
    position: pos, map: gmap,
    label: { text: String(i+1), color: 'white', fontWeight: 'bold', fontSize: '12px' },
    title: s.name,
    icon: {
      path: google.maps.SymbolPath.CIRCLE,
      scale: 14,
      fillColor: s.visited ? '#4A8C6F' : ci.ac,
      fillOpacity: 1,
      strokeColor: 'white',
      strokeWeight: 2,
    },
  });
  const iw = new google.maps.InfoWindow({
    content: `<div style="font-family:'Zen Maru Gothic',sans-serif;padding:6px 4px;min-width:120px">
      <strong style="font-size:14px">${s.name}</strong><br>
      <small style="color:#6B5E4E">${ci.e} ${s.cat}</small>
      ${s.visited ? '<br><small style="color:#4A8C6F">✓ 行った！</small>' : ''}
    </div>`
  });
  marker.addListener('click', () => iw.open(gmap, marker));
  markers.push(marker);
  bounds.extend(pos);

  const item = document.createElement('div');
  item.className = 'map-spot-item';
  item.innerHTML = `
    <div class="map-spot-num" style="background:${s.visited ? '#4A8C6F' : ci.ac}">${i+1}</div>
    <div class="map-spot-info">
      <div class="map-spot-name">${s.name}${s.visited ? ' <span style="font-size:11px;color:#4A8C6F">✓</span>' : ''}</div>
      <div class="map-spot-cat">${ci.e} ${s.cat} · by ${s.addedBy||'?'}</div>
    </div>`;
  item.onclick = () => { gmap.setCenter(pos); gmap.setZoom(16); iw.open(gmap, marker); };
  mapList.appendChild(item);
}

function renderMap() {
  if (!gmap) return;
  markers.forEach(m => m.setMap(null));
  markers = [];
  const mapList = document.getElementById('map-spot-list');
  const arr = filteredSpots();

  if (!arr.length) {
    mapList.innerHTML = '<div class="empty"><span class="empty-emoji">📍</span><p>スポットがないよ</p></div>';
    return;
  }

  const bounds = new google.maps.LatLngBounds();
  mapList.innerHTML = '';
  let idx = 1;
  const noCoords = [];

  // 座標があるスポットは直接ピンを立てる
  arr.forEach(s => {
    if (s.lat && s.lng) {
      addMarkerToMap(s, idx++, bounds, mapList);
    } else {
      noCoords.push(s);
    }
  });

  // 座標がないスポットはGeocodeで座標を取得
  const geocoder = new google.maps.Geocoder();
  noCoords.forEach(s => {
    const currentIdx = idx++;
    geocoder.geocode({ address: s.name + ' 日本', language: 'ja' }, (results, status) => {
      if (status === 'OK' && results[0]) {
        const loc = results[0].geometry.location;
        s.lat = loc.lat();
        s.lng = loc.lng();
        // Firebaseに座標を保存
        if (window._fbUpdate) window._fbUpdate(s.id, { lat: s.lat, lng: s.lng });
        addMarkerToMap(s, currentIdx, bounds, mapList);
        bounds.extend({ lat: s.lat, lng: s.lng });
        if (!bounds.isEmpty()) gmap.fitBounds(bounds);
      } else {
        // 座標が取れなかった場合もリストには追加
        const item = document.createElement('div');
        item.className = 'map-spot-item';
        const ci = getSubCat(s.cat);
        item.innerHTML = `
          <div class="map-spot-num" style="background:#A89880">${currentIdx}</div>
          <div class="map-spot-info">
            <div class="map-spot-name">${s.name} <span style="font-size:11px;color:#A89880">📍位置未取得</span></div>
            <div class="map-spot-cat">${ci.e} ${s.cat} · by ${s.addedBy||'?'}</div>
          </div>`;
        mapList.appendChild(item);
      }
    });
  });

  if (!bounds.isEmpty()) gmap.fitBounds(bounds);
}

function linkify(text) {
  if (!text) return '';
  return text.replace(/(https?:\/\/[^\s]+)/g, url => `<a href="${url}" target="_blank" rel="noopener">${url}</a>`);
}

function filteredSpots() {
  let arr = Object.entries(spots).map(([id,s])=>({id,...s}));
  if (filterBig !== 'all') {
    const subs = (SUB_CATS[filterBig]||[]).map(s=>s.v);
    arr = arr.filter(s => subs.includes(s.cat));
  }
  if (filterSub !== 'all') arr = arr.filter(s => s.cat===filterSub);
  return arr.sort((a,b) => (b.pri-a.pri)||(a.visited?1:-1));
}

function renderSpots() {
  const container = document.getElementById('list-view');
  const arr = filteredSpots();
  if (!arr.length) {
    container.innerHTML = `<div class="empty"><span class="empty-emoji">🌏</span><p>まだスポットがないよ<br>検索バーか「＋ 場所を追加」で追加しよう！</p></div>`;
    return;
  }
  container.innerHTML = arr.map(s => {
    const ci = getSubCat(s.cat);
    const stars = [1,2,3].map(i=>`<button class="star-btn" onclick="setPri('${s.id}',${i})">${i<=s.pri?'★':'☆'}</button>`).join('');
    const mapBtn = s.mapUrl ? `<button class="action-btn btn-map" onclick="window.open('${s.mapUrl}','_blank')">🗺️ マップ</button>` : '';
    return `
    <div class="spot-card${s.visited?' visited':''}">
      <div class="card-accent" style="background:${ci.ac}"></div>
      <div class="card-body">
        <div class="card-top">
          <div class="cat-icon" style="background:${ci.bg}">${ci.e}</div>
          <div class="card-info">
            <div class="card-name-row">
              <span class="card-name">${s.name}</span>
              ${s.visited?'<span class="visited-tag">✓ 行った！</span>':''}
            </div>
            <div class="card-meta">
              <span class="cat-tag" style="background:${ci.bg};color:${ci.tx}">${ci.e} ${s.cat}</span>
              <div class="stars-row">${stars}</div>
              <span class="added-by">by ${s.addedBy||'?'}</span>
            </div>
            ${s.memo?`<div class="card-memo">${linkify(s.memo)}</div>`:''}
            <div class="card-actions">
              ${s.visited
                ?`<button class="action-btn" onclick="toggleVisit('${s.id}')">↩ 未訪問に戻す</button>`
                :`<button class="action-btn btn-go" onclick="toggleVisit('${s.id}')">✓ 行ってきた！</button>`}
              ${mapBtn}
              <button class="action-btn" onclick="editSpot('${s.id}')">✏️ 編集</button>
              <button class="action-btn btn-del" onclick="deleteSpot('${s.id}')">🗑</button>
            </div>
          </div>
        </div>
      </div>
    </div>`;
  }).join('');
}

// ========== モーダル ==========
window.openModal = function() {
  if (!editId) { selectedPlace=null; document.getElementById('place-preview').classList.remove('show'); }
  document.getElementById('modal-title').textContent = editId?'編集':'場所を追加';
  document.getElementById('modal-overlay').classList.add('open');
  setTimeout(()=>document.getElementById('f-name').focus(),300);
};
window.closeModal = function() {
  document.getElementById('modal-overlay').classList.remove('open');
  editId=null; selBigCat=''; selSubCat=''; selPriVal=0; selectedPlace=null;
  document.getElementById('f-name').value='';
  document.getElementById('f-memo').value='';
  document.getElementById('modal-pac-input').value='';
  document.getElementById('place-preview').classList.remove('show');
  document.querySelectorAll('.big-cat-opt').forEach(e=>e.classList.remove('selected'));
  document.getElementById('modal-sub-cat').innerHTML = '';
  document.getElementById('modal-sub-cat').style.display = 'none';
  document.querySelectorAll('.pri-btn').forEach(e=>e.classList.remove('selected'));
};
window.closeModalBg = function(e) { if(e.target===document.getElementById('modal-overlay')) window.closeModal(); };

window.saveSpot = function() {
  const name = document.getElementById('f-name').value.trim();
  if (!name) { alert('場所の名前を入力してね！'); return; }
  if (!selBigCat) { alert('大カテゴリを選んでね！（食事・カフェなど）'); return; }
  if (!selSubCat) { alert('カテゴリの種類を選んでね！（ラーメン・カフェなど）'); return; }
  if (!selPriVal) { alert('行きたい度を選んでね！'); return; }
  const memo = document.getElementById('f-memo').value.trim();
  const mapUrl = selectedPlace?.mapUrl || (editId?spots[editId]?.mapUrl:null) || `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(name)}`;
  const lat = selectedPlace?.lat || (editId?spots[editId]?.lat:null) || null;
  const lng = selectedPlace?.lng || (editId?spots[editId]?.lng:null) || null;
  const data = { name, cat:selSubCat, pri:selPriVal, memo, visited:false, addedBy:currentUser, mapUrl, lat, lng, updatedAt:Date.now() };
  try {
    if (editId && spots[editId]) {
      data.visited = spots[editId].visited;
      data.addedBy = spots[editId].addedBy;
      window._fbUpdate(editId, data);
    } else {
      window._fbPush(data);
    }
    window.closeModal();
  } catch(err) {
    alert('保存エラー: ' + err.message);
  }
};

window.toggleVisit = id => { const s=spots[id]; if(s) window._fbUpdate(id,{visited:!s.visited}); };
window.setPri = (id,v) => window._fbUpdate(id,{pri:v});
window.deleteSpot = id => { if(!confirm('削除しますか？')) return; window._fbRemove(id); };
window.editSpot = function(id) {
  const s=spots[id]; if(!s) return;
  editId=id; selPriVal=s.pri;
  selBigCat = getBigCatOf(s.cat) || '';
  selSubCat = s.cat;
  document.getElementById('f-name').value=s.name;
  document.getElementById('f-memo').value=s.memo||'';
  window.openModal();
  // openModal後に選択状態を反映
  setTimeout(()=>{
    // 大カテゴリを選択してサブカテゴリを表示
    selBigCatFn(selBigCat);
    // サブカテゴリを選択
    setTimeout(()=>{
      onSubCatClick(s.cat);
      // 行きたい度を選択
      document.querySelectorAll('.pri-btn').forEach(e=>{
        e.classList.toggle('selected', parseInt(e.dataset.v)===s.pri);
      });
    }, 50);
  }, 50);
};
</script>
