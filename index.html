<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ふたりの行きたいところ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --coral: #E8614A; --coral-light: #FFF0EE; --coral-dark: #C44A34;
  --sand: #F5F0E8; --sand-dark: #E8E0D0; --ink: #2A2318;
  --ink-mid: #6B5E4E; --ink-light: #A89880; --white: #FDFAF6;
  --green: #4A8C6F; --green-light: #EBF5F0;
  --radius: 16px; --radius-sm: 10px;
  --shadow: 0 2px 16px rgba(42,35,24,0.08);
  --shadow-md: 0 4px 24px rgba(42,35,24,0.12);
}
body { font-family: 'Zen Maru Gothic', sans-serif; background: var(--sand); color: var(--ink); min-height: 100vh; }
 
#name-screen { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; background: var(--white); }
.name-card { background: var(--white); border: 1.5px solid var(--sand-dark); border-radius: 24px; padding: 2.5rem 2rem; max-width: 360px; width: 100%; text-align: center; box-shadow: var(--shadow-md); }
.name-card .pin-emoji { font-size: 48px; display: block; margin-bottom: 1rem; animation: bounce 2s infinite; }
@keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
.name-card h1 { font-size: 22px; font-weight: 700; margin-bottom: 0.4rem; }
.name-card p { font-size: 14px; color: var(--ink-mid); margin-bottom: 1.5rem; line-height: 1.6; }
.name-input { width: 100%; padding: 12px 16px; border: 1.5px solid var(--sand-dark); border-radius: var(--radius-sm); font-family: 'Zen Maru Gothic', sans-serif; font-size: 16px; background: var(--sand); color: var(--ink); outline: none; transition: border-color 0.2s; margin-bottom: 1rem; }
.name-input:focus { border-color: var(--coral); }
.start-btn { width: 100%; padding: 13px; background: var(--coral); color: white; border: none; border-radius: var(--radius-sm); font-family: 'Zen Maru Gothic', sans-serif; font-size: 16px; font-weight: 700; cursor: pointer; transition: background 0.2s; }
.start-btn:hover { background: var(--coral-dark); }
 
#app { display: none; max-width: 600px; margin: 0 auto; padding: 0 0 6rem; }
.app-header { background: var(--white); border-bottom: 1.5px solid var(--sand-dark); padding: 1rem 1.25rem; position: sticky; top: 0; z-index: 50; }
.header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.75rem; }
.header-title { display: flex; align-items: center; gap: 8px; }
.header-title h1 { font-size: 17px; font-weight: 700; }
.user-badge { background: var(--coral-light); color: var(--coral-dark); font-size: 13px; font-weight: 700; padding: 5px 12px; border-radius: 99px; border: 1.5px solid var(--coral); }
.sync-indicator { font-size: 11px; color: var(--ink-light); display: flex; align-items: center; gap: 5px; margin-bottom: 0.6rem; }
.sync-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
.filter-row { display: flex; gap: 6px; overflow-x: auto; scrollbar-width: none; padding-bottom: 2px; }
.filter-row::-webkit-scrollbar { display: none; }
.filter-chip { flex-shrink: 0; padding: 5px 12px; border-radius: 99px; font-size: 12px; font-family: 'Zen Maru Gothic', sans-serif; border: 1.5px solid var(--sand-dark); background: var(--white); color: var(--ink-mid); cursor: pointer; transition: all 0.15s; white-space: nowrap; }
.filter-chip.active { background: var(--coral); border-color: var(--coral); color: white; font-weight: 700; }
 
.stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; padding: 1rem 1.25rem 0; }
.stat-box { background: var(--white); border-radius: var(--radius-sm); padding: 12px 10px; text-align: center; border: 1.5px solid var(--sand-dark); }
.stat-num { font-size: 24px; font-weight: 700; color: var(--coral); }
.stat-label { font-size: 11px; color: var(--ink-mid); margin-top: 2px; }
 
.map-search-bar { margin: 0.75rem 1.25rem 0; }
#pac-input { width: 100%; padding: 11px 14px; border: 1.5px solid var(--sand-dark); border-radius: var(--radius-sm); font-family: 'Zen Maru Gothic', sans-serif; font-size: 14px; background: var(--white); color: var(--ink); outline: none; transition: border-color 0.2s; }
#pac-input:focus { border-color: var(--coral); }
 
.spots-container { padding: 0.75rem 1.25rem; }
.spot-card { background: var(--white); border: 1.5px solid var(--sand-dark); border-radius: var(--radius); margin-bottom: 10px; overflow: hidden; transition: transform 0.15s, box-shadow 0.15s; animation: slideIn 0.25s ease; }
@keyframes slideIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
.spot-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
.spot-card.visited { opacity: 0.55; }
.card-accent { height: 4px; width: 100%; }
.card-body { padding: 0.9rem 1rem; }
.card-top { display: flex; align-items: flex-start; gap: 10px; }
.cat-icon { width: 42px; height: 42px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
.card-info { flex: 1; min-width: 0; }
.card-name-row { display: flex; align-items: center; gap: 6px; margin-bottom: 5px; flex-wrap: wrap; }
.card-name { font-size: 15px; font-weight: 700; }
.visited-tag { font-size: 11px; padding: 2px 8px; border-radius: 99px; background: var(--green-light); color: var(--green); font-weight: 700; border: 1px solid var(--green); }
.card-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.cat-tag { font-size: 12px; padding: 3px 10px; border-radius: 99px; font-weight: 500; }
.stars-row { display: flex; gap: 1px; }
.star-btn { background: none; border: none; font-size: 15px; cursor: pointer; padding: 1px; transition: transform 0.1s; line-height: 1; }
.star-btn:hover { transform: scale(1.25); }
.added-by { font-size: 11px; color: var(--ink-light); font-family: 'DM Mono', monospace; }
.card-memo { font-size: 13px; color: var(--ink-mid); margin-top: 8px; padding-top: 8px; border-top: 1px dashed var(--sand-dark); line-height: 1.6; word-break: break-all; }
.card-memo a { color: var(--coral); text-decoration: underline; }
.card-actions { display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap; }
.action-btn { font-size: 12px; padding: 5px 10px; border-radius: var(--radius-sm); border: 1.5px solid var(--sand-dark); background: var(--sand); color: var(--ink-mid); cursor: pointer; font-family: 'Zen Maru Gothic', sans-serif; transition: all 0.15s; display: flex; align-items: center; gap: 4px; }
.action-btn:hover { background: var(--sand-dark); color: var(--ink); }
.btn-go { border-color: var(--green); color: var(--green); background: var(--green-light); }
.btn-go:hover { background: var(--green); color: white; }
.btn-map { border-color: #3A78B5; color: #3A78B5; background: #EBF3FC; }
.btn-map:hover { background: #3A78B5; color: white; }
.btn-del { border-color: #e0b0b0; color: #b04040; background: #fff5f5; }
.btn-del:hover { background: #b04040; color: white; }
 
.fab { position: fixed; bottom: 2rem; right: 50%; transform: translateX(50%); max-width: 220px; width: calc(100% - 2.5rem); background: var(--coral); color: white; border: none; border-radius: 99px; padding: 14px 24px; font-size: 15px; font-weight: 700; font-family: 'Zen Maru Gothic', sans-serif; cursor: pointer; box-shadow: 0 4px 20px rgba(232,97,74,0.4); transition: background 0.2s, transform 0.1s; z-index: 40; display: flex; align-items: center; justify-content: center; gap: 8px; }
.fab:hover { background: var(--coral-dark); }
.fab:active { transform: translateX(50%) scale(0.97); }
 
.modal-overlay { position: fixed; inset: 0; background: rgba(42,35,24,0.45); z-index: 100; display: flex; align-items: flex-end; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
.modal-overlay.open { opacity: 1; pointer-events: all; }
.modal { background: var(--white); border-radius: 24px 24px 0 0; padding: 1.5rem 1.25rem 2rem; width: 100%; max-width: 600px; transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.4,0,0.2,1); max-height: 90vh; overflow-y: auto; }
.modal-overlay.open .modal { transform: translateY(0); }
.modal-handle { width: 36px; height: 4px; background: var(--sand-dark); border-radius: 99px; margin: 0 auto 1.25rem; }
.modal-title { font-size: 17px; font-weight: 700; margin-bottom: 1.25rem; }
.field { margin-bottom: 1rem; }
.field label { display: block; font-size: 13px; color: var(--ink-mid); margin-bottom: 6px; font-weight: 500; }
.field input, .field textarea { width: 100%; padding: 11px 14px; border: 1.5px solid var(--sand-dark); border-radius: var(--radius-sm); font-family: 'Zen Maru Gothic', sans-serif; font-size: 15px; background: var(--sand); color: var(--ink); outline: none; transition: border-color 0.2s; }
.field input:focus, .field textarea:focus { border-color: var(--coral); background: var(--white); }
.field textarea { height: 80px; resize: none; }
.cat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
.cat-opt { padding: 8px 4px; border: 1.5px solid var(--sand-dark); border-radius: var(--radius-sm); text-align: center; font-size: 12px; cursor: pointer; background: var(--white); color: var(--ink-mid); font-family: 'Zen Maru Gothic', sans-serif; transition: all 0.15s; line-height: 1.4; }
.cat-opt.selected { border-color: var(--coral); color: var(--coral-dark); background: var(--coral-light); font-weight: 700; }
.pri-row { display: flex; gap: 6px; }
.pri-btn { flex: 1; padding: 9px 4px; border: 1.5px solid var(--sand-dark); border-radius: var(--radius-sm); text-align: center; font-size: 13px; cursor: pointer; background: var(--white); color: var(--ink-mid); font-family: 'Zen Maru Gothic', sans-serif; transition: all 0.15s; }
.pri-btn.selected { border-color: var(--coral); background: var(--coral-light); color: var(--coral-dark); font-weight: 700; }
.modal-btns { display: flex; gap: 8px; margin-top: 1.5rem; }
.modal-btns button { flex: 1; padding: 12px; border-radius: var(--radius-sm); font-size: 15px; font-family: 'Zen Maru Gothic', sans-serif; font-weight: 700; cursor: pointer; border: 1.5px solid var(--sand-dark); background: var(--sand); color: var(--ink-mid); }
.modal-btns .save { background: var(--coral); border-color: var(--coral); color: white; }
.modal-btns .save:hover { background: var(--coral-dark); }
 
.place-preview { background: var(--sand); border-radius: var(--radius-sm); padding: 10px 12px; margin-bottom: 1rem; font-size: 13px; color: var(--ink-mid); border: 1.5px solid var(--sand-dark); display: none; }
.place-preview.show { display: block; }
.place-preview strong { color: var(--ink); font-size: 14px; display: block; margin-bottom: 2px; }
.empty { text-align: center; padding: 3rem 1rem; color: var(--ink-light); }
.empty-emoji { font-size: 40px; display: block; margin-bottom: 0.75rem; }
</style>
</head>
<body>
 
<div id="name-screen">
  <div class="name-card">
    <span class="pin-emoji">📍</span>
    <h1>ふたりの行きたいところ</h1>
    <p>あなたの名前を入れてね。<br>彼女と同じリストをリアルタイムで共有できるよ！</p>
    <input class="name-input" id="username-input" type="text" placeholder="例：たろう" maxlength="10">
    <button class="start-btn" onclick="startApp()">はじめる ✈️</button>
  </div>
</div>
 
<div id="app">
  <div class="app-header">
    <div class="header-top">
      <div class="header-title"><span>🗺️</span><h1>ふたりの行きたいところ</h1></div>
      <div class="user-badge" id="user-badge"></div>
    </div>
    <div class="sync-indicator"><div class="sync-dot"></div><span>リアルタイム同期中</span></div>
    <div class="filter-row" id="filter-row"></div>
  </div>
  <div class="stats-row" id="stats-row"></div>
  <div class="map-search-bar">
    <input id="pac-input" type="text" placeholder="🔍 場所を検索して追加（例：渋谷スカイ）">
  </div>
  <div class="spots-container" id="spots-container"><div style="text-align:center;padding:3rem;color:var(--ink-light)">読み込み中…</div></div>
  <button class="fab" onclick="openModal()">＋ 場所を追加</button>
</div>
 
<div class="modal-overlay" id="modal-overlay" onclick="closeModalBg(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modal-title">場所を追加</div>
    <div class="place-preview" id="place-preview"><strong id="preview-name"></strong><span id="preview-addr"></span></div>
    <div class="field"><label>場所の名前</label><input type="text" id="f-name" placeholder="例：代々木公園"></div>
    <div class="field"><label>カテゴリ</label><div class="cat-grid" id="cat-grid"></div></div>
    <div class="field"><label>行きたい度</label>
      <div class="pri-row">
        <div class="pri-btn" data-v="1" onclick="selPri(this)">★ ちょっと</div>
        <div class="pri-btn" data-v="2" onclick="selPri(this)">★★ 行きたい</div>
        <div class="pri-btn" data-v="3" onclick="selPri(this)">★★★ 絶対！</div>
      </div>
    </div>
    <div class="field"><label>メモ・リンク（TikTok・Googleマップなど貼ってOK）</label><textarea id="f-memo" placeholder="https://... やメモを入力"></textarea></div>
    <div class="modal-btns">
      <button onclick="closeModal()">キャンセル</button>
      <button class="save" onclick="saveSpot()">保存する</button>
    </div>
  </div>
</div>
 
<script>
const CATEGORIES = [
  { v:'ラーメン',      e:'🍜', bg:'#FFF3E0', ac:'#E65100', tx:'#BF360C' },
  { v:'イタリアン',    e:'🍝', bg:'#FCE4EC', ac:'#C2185B', tx:'#880E4F' },
  { v:'和食',          e:'🍱', bg:'#F3E5F5', ac:'#7B1FA2', tx:'#4A148C' },
  { v:'ディナー',      e:'🥂', bg:'#E8EAF6', ac:'#3949AB', tx:'#1A237E' },
  { v:'カフェ',        e:'☕', bg:'#FFF8E8', ac:'#D4900A', tx:'#A06800' },
  { v:'スイーツ',      e:'🍰', bg:'#FCE4EC', ac:'#E91E63', tx:'#880E4F' },
  { v:'焼肉・BBQ',    e:'🥩', bg:'#FBE9E7', ac:'#BF360C', tx:'#870000' },
  { v:'居酒屋',        e:'🍻', bg:'#FFF3E0', ac:'#E65100', tx:'#BF360C' },
  { v:'観光',          e:'🗺️', bg:'#EBF3FC', ac:'#3A78B5', tx:'#1A5890' },
  { v:'テーマパーク',  e:'🎢', bg:'#FFF0EE', ac:'#E8614A', tx:'#C44A34' },
  { v:'美術館・博物館',e:'🖼️', bg:'#F3E5F5', ac:'#7B1FA2', tx:'#4A148C' },
  { v:'自然・公園',    e:'🌿', bg:'#EBF5F0', ac:'#4A8C6F', tx:'#2A6C4F' },
  { v:'ショッピング',  e:'🛍️', bg:'#FCEEF6', ac:'#C45890', tx:'#9A3870' },
  { v:'エンタメ',      e:'🎡', bg:'#F2EEFF', ac:'#7A5CB8', tx:'#5A3C98' },
  { v:'温泉・スパ',    e:'♨️', bg:'#FFF3E0', ac:'#FF6F00', tx:'#E65100' },
  { v:'ドライブ',      e:'🚗', bg:'#E3F2FD', ac:'#1565C0', tx:'#0D47A1' },
  { v:'その他',        e:'📍', bg:'#F5F0E8', ac:'#A89880', tx:'#6B5E4E' },
];
 
let spots = {}, currentUser = '', filter = 'all', editId = null, selCatVal = '', selPriVal = 0, selectedPlace = null;
 
function buildCatGrid() {
  document.getElementById('cat-grid').innerHTML = CATEGORIES.map(c =>
    `<div class="cat-opt" data-v="${c.v}" onclick="selCat(this)">${c.e} ${c.v}</div>`
  ).join('');
}
 
function buildFilterTabs() {
  const tabs = [{ v:'all', label:'すべて' }, ...CATEGORIES.map(c => ({ v:c.v, label:`${c.e} ${c.v}` }))];
  document.getElementById('filter-row').innerHTML = tabs.map((t,i) =>
    `<div class="filter-chip${i===0?' active':''}" data-cat="${t.v}" onclick="setFilter('${t.v}',this)">${t.label}</div>`
  ).join('');
}
 
window.setFilter = function(cat, el) {
  filter = cat;
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  renderSpots();
};
 
window.startApp = function() {
  const name = document.getElementById('username-input').value.trim();
  if (!name) { alert('名前を入力してね！'); return; }
  currentUser = name;
  document.getElementById('name-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('user-badge').textContent = name + ' として参加中';
  buildCatGrid();
  buildFilterTabs();
  initFirebase();
  initMaps();
};
document.getElementById('username-input').addEventListener('keypress', e => { if (e.key==='Enter') window.startApp(); });
 
function initMaps() {
  const input = document.getElementById('pac-input');
  const autocomplete = new google.maps.places.Autocomplete(input, { language: 'ja' });
  autocomplete.addListener('place_changed', () => {
    const place = autocomplete.getPlace();
    if (!place.name) return;
    selectedPlace = {
      name: place.name,
      addr: place.formatted_address || '',
      mapUrl: place.url || `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(place.name)}`,
    };
    openModal();
    document.getElementById('f-name').value = selectedPlace.name;
    document.getElementById('preview-name').textContent = selectedPlace.name;
    document.getElementById('preview-addr').textContent = selectedPlace.addr;
    document.getElementById('place-preview').classList.add('show');
    input.value = '';
  });
}
 
function renderStats() {
  const arr = Object.values(spots);
  document.getElementById('stats-row').innerHTML = `
    <div class="stat-box"><div class="stat-num">${arr.length}</div><div class="stat-label">登録スポット</div></div>
    <div class="stat-box"><div class="stat-num">${arr.filter(s=>s.visited).length}</div><div class="stat-label">行った場所 ✓</div></div>
    <div class="stat-box"><div class="stat-num">${arr.filter(s=>s.pri===3).length}</div><div class="stat-label">絶対行きたい！</div></div>
  `;
}
 
function linkify(text) {
  if (!text) return '';
  return text.replace(/(https?:\/\/[^\s]+)/g, url => `<a href="${url}" target="_blank" rel="noopener">${url}</a>`);
}
 
function renderSpots() {
  const container = document.getElementById('spots-container');
  let arr = Object.entries(spots).map(([id,s]) => ({ id, ...s }));
  if (filter !== 'all') arr = arr.filter(s => s.cat === filter);
  arr.sort((a,b) => (b.pri-a.pri) || (a.visited?1:-1));
  if (!arr.length) {
    container.innerHTML = `<div class="empty"><span class="empty-emoji">🌏</span><p>まだスポットがないよ<br>上の検索バーか「＋ 場所を追加」で追加しよう！</p></div>`;
    return;
  }
  container.innerHTML = arr.map(s => {
    const ci = CATEGORIES.find(c=>c.v===s.cat) || { e:'📍', bg:'#F5F0E8', ac:'#A89880', tx:'#6B5E4E' };
    const stars = [1,2,3].map(i => `<button class="star-btn" onclick="setPri('${s.id}',${i})">${i<=s.pri?'★':'☆'}</button>`).join('');
    const mapBtn = s.mapUrl ? `<button class="action-btn btn-map" onclick="window.open('${s.mapUrl}','_blank')">🗺️ マップ</button>` : '';
    return `
    <div class="spot-card${s.visited?' visited':''}">
      <div class="card-accent" style="background:${ci.ac}"></div>
      <div class="card-body">
        <div class="card-top">
          <div class="cat-icon" style="background:${ci.bg}">${ci.e}</div>
          <div class="card-info">
            <div class="card-name-row">
              <span class="card-name">${s.name}</span>
              ${s.visited?'<span class="visited-tag">✓ 行った！</span>':''}
            </div>
            <div class="card-meta">
              <span class="cat-tag" style="background:${ci.bg};color:${ci.tx}">${ci.e} ${s.cat}</span>
              <div class="stars-row">${stars}</div>
              <span class="added-by">by ${s.addedBy||'?'}</span>
            </div>
            ${s.memo ? `<div class="card-memo">${linkify(s.memo)}</div>` : ''}
            <div class="card-actions">
              ${s.visited
                ? `<button class="action-btn" onclick="toggleVisit('${s.id}')">↩ 未訪問に戻す</button>`
                : `<button class="action-btn btn-go" onclick="toggleVisit('${s.id}')">✓ 行ってきた！</button>`
              }
              ${mapBtn}
              <button class="action-btn" onclick="editSpot('${s.id}')">✏️ 編集</button>
              <button class="action-btn btn-del" onclick="deleteSpot('${s.id}')">🗑</button>
            </div>
          </div>
        </div>
      </div>
    </div>`;
  }).join('');
}
 
window.openModal = function() {
  if (!editId) { selectedPlace = null; document.getElementById('place-preview').classList.remove('show'); }
  document.getElementById('modal-title').textContent = editId ? '編集' : '場所を追加';
  document.getElementById('modal-overlay').classList.add('open');
  setTimeout(() => document.getElementById('f-name').focus(), 300);
};
window.closeModal = function() {
  document.getElementById('modal-overlay').classList.remove('open');
  editId = null; selCatVal = ''; selPriVal = 0; selectedPlace = null;
  document.getElementById('f-name').value = '';
  document.getElementById('f-memo').value = '';
  document.getElementById('place-preview').classList.remove('show');
  document.querySelectorAll('.cat-opt').forEach(e=>e.classList.remove('selected'));
  document.querySelectorAll('.pri-btn').forEach(e=>e.classList.remove('selected'));
};
window.closeModalBg = function(e) { if (e.target===document.getElementById('modal-overlay')) window.closeModal(); };
window.selCat = function(el) { selCatVal=el.dataset.v; document.querySelectorAll('.cat-opt').forEach(e=>e.classList.remove('selected')); el.classList.add('selected'); };
window.selPri = function(el) { selPriVal=parseInt(el.dataset.v); document.querySelectorAll('.pri-btn').forEach(e=>e.classList.remove('selected')); el.classList.add('selected'); };
 
window.saveSpot = function() {
  const name = document.getElementById('f-name').value.trim();
  if (!name || !selCatVal || !selPriVal) { alert('名前・カテゴリ・行きたい度を入力してね！'); return; }
  const memo = document.getElementById('f-memo').value.trim();
  const mapUrl = selectedPlace?.mapUrl || (editId ? spots[editId]?.mapUrl : null) || `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(name)}`;
  const data = { name, cat:selCatVal, pri:selPriVal, memo, visited:false, addedBy:currentUser, mapUrl, updatedAt:Date.now() };
  if (editId) { data.visited=spots[editId].visited; data.addedBy=spots[editId].addedBy; window._fbUpdate(editId, data); }
  else { window._fbPush(data); }
  window.closeModal();
};
 
window.toggleVisit = function(id) { const s=spots[id]; if(s) window._fbUpdate(id,{visited:!s.visited}); };
window.setPri = function(id,v) { window._fbUpdate(id,{pri:v}); };
window.deleteSpot = function(id) { if(!confirm('削除しますか？')) return; window._fbRemove(id); };
window.editSpot = function(id) {
  const s=spots[id]; if(!s) return;
  editId=id; selCatVal=s.cat; selPriVal=s.pri;
  document.getElementById('f-name').value=s.name;
  document.getElementById('f-memo').value=s.memo||'';
  document.querySelectorAll('.cat-opt').forEach(e=>e.classList.toggle('selected',e.dataset.v===s.cat));
  document.querySelectorAll('.pri-btn').forEach(e=>e.classList.toggle('selected',parseInt(e.dataset.v)===s.pri));
  window.openModal();
};
</script>
